<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal</title>
    <style>
        /* Estilos básicos para el modal de prueba */
        .evento-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .evento-popup.is-visible {
            opacity: 1;
            visibility: visible;
        }

        .evento-popup-content {
            background: #ffffff;
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .evento-popup-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .evento-popup-title {
            font-family: sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #184014;
            text-align: center;
            margin: 0 0 1rem 0;
        }

        .evento-popup-text {
            font-family: sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #4b5563;
            text-align: center;
            margin: 0 0 1.5rem 0;
        }

        .evento-popup-button {
            display: block;
            width: 100%;
            padding: 0.875rem;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #B93A05;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Test de Modal</h1>
    
    <button id="test-success">Mostrar Modal de Éxito</button>
    <button id="test-error">Mostrar Modal de Error</button>

    <!-- Modal de éxito -->
    <div id="evento-success-popup" class="evento-popup">
        <div class="evento-popup-content">
            <div class="evento-popup-icon">🎉</div>
            <h3 class="evento-popup-title">¡Inscripción exitosa! (TEST)</h3>
            <p class="evento-popup-text">
                Tu inscripción ha sido registrada correctamente.
            </p>
            <button id="evento-popup-close-btn" class="evento-popup-button">Cerrar</button>
        </div>
    </div>

    <!-- Modal de error -->
    <div id="evento-error-popup" class="evento-popup">
        <div class="evento-popup-content">
            <div class="evento-popup-icon">⚠️</div>
            <h3 class="evento-popup-title">Error en la inscripción (TEST)</h3>
            <p id="evento-error-message" class="evento-popup-text">
                Hubo un problema al procesar tu inscripción.
            </p>
            <button id="evento-error-popup-close-btn" class="evento-popup-button">Cerrar</button>
        </div>
    </div>

    <script>
        // Función simple para mostrar/ocultar modales
        function $(id) { return document.getElementById(id); }
        
        function showSuccessModal() {
            var popup = $('evento-success-popup');
            if (popup) popup.classList.add('is-visible');
        }
        
        function showErrorModal() {
            var popup = $('evento-error-popup');
            if (popup) popup.classList.add('is-visible');
        }
        
        function closeAllModals() {
            var successPopup = $('evento-success-popup');
            var errorPopup = $('evento-error-popup');
            if (successPopup) successPopup.classList.remove('is-visible');
            if (errorPopup) errorPopup.classList.remove('is-visible');
        }
        
        // Event listeners
        document.getElementById('test-success').addEventListener('click', showSuccessModal);
        document.getElementById('test-error').addEventListener('click', showErrorModal);
        document.getElementById('evento-popup-close-btn').addEventListener('click', closeAllModals);
        document.getElementById('evento-error-popup-close-btn').addEventListener('click', closeAllModals);
        
        // Cerrar al hacer clic fuera del modal
        document.addEventListener('click', function (e) {
            var successPopup = $('evento-success-popup');
            var errorPopup = $('evento-error-popup');
            
            if (successPopup && e.target === successPopup) {
                successPopup.classList.remove('is-visible');
            }
            
            if (errorPopup && e.target === errorPopup) {
                errorPopup.classList.remove('is-visible');
            }
        });
        
        console.log("Test de modal cargado. Haz clic en los botones para probar.");
    </script>
</body>
</html>
